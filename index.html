<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>S-PULSE AR Photo Frame</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* 📹 カメラ映像を画面全体に広げる */
        video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: absolute;
            top: 0; left: 0;
        }

        /* 🖼️ フレームも画面サイズ（100vw×100vh）に完全に一致させる */
        #ar-frame-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; 
        }
        #ar-frame {
            width: 100%; 
            height: 100%;
            object-fit: cover; 
        }

        /* 📸 撮影ボタン（エスパルスオレンジ） */
        #shutter-btn {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #ff7f00;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
        }
        #shutter-btn:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 🔄 カメラ切り替えボタン */
        #switch-camera-btn {
            position: fixed;
            bottom: 40px; right: 30px;
            width: 50px; height: 50px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
        #switch-camera-btn:active {
            transform: scale(0.9);
        }

        /* 🖼️ 撮影後の写真ポップアップ表示 */
        #result-popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #result-img {
            max-width: 90%;
            max-height: 65%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            object-fit: contain;
        }
        .popup-text {
            color: white;
            font-size: 14px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
            line-height: 1.5;
        }
        
        /* ボタンエリア */
        .popup-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .btn {
            padding: 12px 25px;
            font-size: 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }
        .btn-main { background: #ff7f00; color: white; }
        .btn-sub { background: #fff; color: #333; }
    </style>
</head>
<body>

    <div id="ar-frame-container">
        <img id="ar-frame" src="frame.png" alt="AR Frame" crossOrigin="anonymous">
    </div>

    <button id="shutter-btn"></button>
    
    <button id="switch-camera-btn">🔄</button>

    <div id="result-popup">
        <p class="popup-text">
            「写真に保存」ボタンから保存するか、<br>
            画像を長押しして保存してください！
        </p>
        <img id="result-img" src="" alt="撮影された写真">
        <div class="popup-buttons">
            <button class="btn btn-sub" onclick="closePopup()">もう一度撮る</button>
            <button id="share-btn" class="btn btn-main">写真に保存</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const shutterBtn = document.getElementById('shutter-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const popup = document.getElementById('result-popup');
        const resultImg = document.getElementById('result-img');
        const shareBtn = document.getElementById('share-btn');
        
        let currentFacingMode = 'environment';
        let blobData = null; // シェア用にデータを一時保存する変数

        // 🔊 外部ファイル不要！「カシャッ」というシャッター音を生成する関数
        function playShutterSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = ctx.sampleRate * 0.1;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                // ホワイトノイズを生成
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                
                // 高音だけを通して「カシャッ」の空気感を再現
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1200;
                
                // 音量を急激に小さくしてシャッターの切れ味を再現
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start();
            } catch (e) {
                console.log("AudioContext blocked or not supported");
            }
        }

        // 📸 シャッターボタンの処理
        shutterBtn.addEventListener('click', () => {
            const video = document.querySelector('video');
            const frameImg = document.getElementById('ar-frame');

            if (!video) return;
            
            // シャッター音を鳴らす
            playShutterSound();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const screenRatio = window.innerWidth / window.innerHeight;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoWidth / screenRatio;

            // ① カメラ映像の切り抜き描画
            const videoRatio = video.videoWidth / video.videoHeight;
            let sx, sy, sw, sh;

            if (videoRatio > screenRatio) {
                sh = video.videoHeight;
                sw = video.videoHeight * screenRatio;
                sx = (video.videoWidth - sw) / 2;
                sy = 0;
            } else {
                sw = video.videoWidth;
                sh = video.videoWidth / screenRatio;
                sx = 0;
                sy = (video.videoHeight - sh) / 2;
            }

            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

            if (currentFacingMode === 'user') {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            // ② フレーム画像の切り抜き描画
            const frameRatio = frameImg.naturalWidth / frameImg.naturalHeight;
            let fx, fy, fw, fh;

            if (frameRatio > screenRatio) {
                fh = frameImg.naturalHeight;
                fw = frameImg.naturalHeight * screenRatio;
                fx = (frameImg.naturalWidth - fw) / 2;
                fy = 0;
            } else {
                fw = frameImg.naturalWidth;
                fh = frameImg.naturalWidth / screenRatio;
                fx = 0;
                fy = (frameImg.naturalHeight - fh) / 2;
            }

            ctx.drawImage(frameImg, fx, fy, fw, fh, 0, 0, canvas.width, canvas.height);

            // ③ 画面への表示と、Web Share API用のデータ変換
            try {
                const dataUrl = canvas.toDataURL('image/png');
                resultImg.src = dataUrl;
                popup.style.display = 'flex';

                // 保存ボタンで使うためのBlob形式に変換して保持
                canvas.toBlob((blob) => { blobData = blob; }, 'image/png');
            } catch (err) {
                alert('エラーが発生しました。スクリーンショットでの撮影をお試しください。');
            }
        });

        // 📥「写真に保存 / シェア」ボタンの処理 (Web Share API)
        shareBtn.addEventListener('click', async () => {
            if (!blobData) return;
            const file = new File([blobData], "s-pulse-ar-photo.png", { type: "image/png" });
            
            // ブラウザがファイル共有に対応しているか判定
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'エスパルス ARフォト',
                        text: 'エスパルスARフォトフレームで撮影したよ！ #spulse'
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') alert('保存・共有に失敗しました。');
                }
            } else {
                // LINE内ブラウザやPCブラウザなど非対応の場合のフォールバック
                const newTab = window.open();
                newTab.document.write(`<img src="${resultImg.src}" style="max-width:100%;">`);
                alert('お使いのブラウザは直接保存ボタンに対応していません。開いた別タブから画像を長押しして保存してください。');
            }
        });

        // 🔄 カメラ切り替え処理
        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';

            const video = document.querySelector('video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then((stream) => {
                if (video) {
                    video.srcObject = stream;
                    video.play();
                    
                    if (currentFacingMode === 'user') {
                        video.style.transform = 'scaleX(-1)';
                    } else {
                        video.style.transform = 'scaleX(1)';
                    }
                }
            }).catch((err) => {
                alert('カメラの切り替えに失敗しました。');
                console.error(err);
            });
        });

        function closePopup() {
            popup.style.display = 'none';
            blobData = null; // データをクリア
        }
    </script>
</body>
</html>

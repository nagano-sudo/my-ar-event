<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>S-PULSE AR Photo Frame</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* 1. 【画面表示の修正】スマホ画面内にフレーム全体がピッタリ収まる設定（削れなし） */
        #ar-frame-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #ar-frame {
            width: 100%; 
            height: 100%;
            /* containに変更することで、フレームの上下左右が一切削られずに画面に収まります */
            object-fit: contain; 
        }

        /* 📸 撮影ボタン（エスパルスオレンジ） */
        #shutter-btn {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #ff7f00;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
        }
        #shutter-btn:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 🔄 カメラ切り替えボタン */
        #switch-camera-btn {
            position: fixed;
            bottom: 40px; right: 30px;
            width: 50px; height: 50px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
        #switch-camera-btn:active {
            transform: scale(0.9);
        }

        /* 🖼️ 撮影後の写真ポップアップ表示（長押し保存用） */
        #result-popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #result-img {
            max-width: 90%;
            max-height: 70%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        .popup-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }
        #close-btn {
            background: #ff7f00;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ar-frame-container">
        <img id="ar-frame" src="frame.png" alt="AR Frame" crossOrigin="anonymous">
    </div>

    <button id="shutter-btn"></button>
    
    <button id="switch-camera-btn">🔄</button>

    <div id="result-popup">
        <p class="popup-text">画像を長押しして<br>「"写真"に追加」や「画像を保存」を<br>選んで保存してください！</p>
        <img id="result-img" src="" alt="撮影された写真">
        <button id="close-btn" onclick="closePopup()">もう一度撮る</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const shutterBtn = document.getElementById('shutter-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const popup = document.getElementById('result-popup');
        const resultImg = document.getElementById('result-img');
        
        let currentFacingMode = 'environment'; // 初期状態は外カメラ

        // 📸 シャッターボタンの処理
        shutterBtn.addEventListener('click', () => {
            const video = document.querySelector('video');
            const frameImg = document.getElementById('ar-frame');

            if (!video) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // 自撮り（内カメラ）の時は、直感的に左右反転（鏡像）させて描画する
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            // 1. まず背景にカメラ映像を描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 反転状態を元に戻してフレームを描画（フレームは反転させない）
            if (currentFacingMode === 'user') {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            // 2. 【写真合成の修正】CSSの「object-fit: contain」の挙動をCanvas上で完全に再現
            const canvasRatio = canvas.width / canvas.height;
            const frameRatio = frameImg.naturalWidth / frameImg.naturalHeight;

            let drawWidth, drawHeight, offsetX, offsetY;

            if (canvasRatio > frameRatio) {
                // カメラ映像の方が横長な場合（フレームの上下をカメラの高さに合わせ、左右を中央寄せにする）
                drawHeight = canvas.height;
                drawWidth = canvas.height * frameRatio;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            } else {
                // カメラ映像の方が縦長な場合（スマホ画面。フレームの横幅をカメラの幅に合わせ、上下を中央寄せにする）
                drawWidth = canvas.width;
                drawHeight = canvas.width / frameRatio;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            }

            // 計算したぴったりサイズでフレームを上に重ねて描画
            ctx.drawImage(frameImg, offsetX, offsetY, drawWidth, drawHeight);

            try {
                resultImg.src = canvas.toDataURL('image/png');
                popup.style.display = 'flex';
            } catch (err) {
                alert('エラーが発生しました。スクリーンショットでの撮影をお試しください。');
            }
        });

        // 🔄 カメラ切り替えボタンの処理
        switchCameraBtn.addEventListener('click', () => {
            const scene = document.querySelector('a-scene');
            if (!scene || !scene.systems.arjs) return;

            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';

            const video = document.querySelector('video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then((stream) => {
                if (video) {
                    video.srcObject = stream;
                    video.play();
                    
                    if (currentFacingMode === 'user') {
                        video.style.transform = 'scaleX(-1)';
                    } else {
                        video.style.transform = 'scaleX(1)';
                    }
                }
            }).catch((err) => {
                alert('カメラの切り替えに失敗しました。');
                console.error(err);
            });
        });

        function closePopup() {
            popup.style.display = 'none';
        }
    </script>
</body>
</html>

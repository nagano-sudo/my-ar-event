<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>S-PULSE AR Photo Frame</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* 📹 カメラ映像を画面全体に広げる */
        video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: absolute;
            top: 0; left: 0;
        }

        /* 🖼️ 【画面表示】フレームも画面サイズ（100vw×100vh）に完全に一致させる */
        #ar-frame-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; 
        }
        #ar-frame {
            width: 100%; 
            height: 100%;
            /* coverにすることで、スマホの画面比率ぴったりに引き伸ばし・トリミングされます */
            object-fit: cover; 
        }

        /* 📸 撮影ボタン（エスパルスオレンジ） */
        #shutter-btn {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #ff7f00;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
        }
        #shutter-btn:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 🔄 カメラ切り替えボタン */
        #switch-camera-btn {
            position: fixed;
            bottom: 40px; right: 30px;
            width: 50px; height: 50px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
        #switch-camera-btn:active {
            transform: scale(0.9);
        }

        /* 🖼️ 撮影後の写真ポップアップ表示（長押し保存用） */
        #result-popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #result-img {
            max-width: 90%;
            max-height: 75%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            object-fit: contain;
        }
        .popup-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
        }
        #close-btn {
            background: #ff7f00;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ar-frame-container">
        <img id="ar-frame" src="frame.png" alt="AR Frame" crossOrigin="anonymous">
    </div>

    <button id="shutter-btn"></button>
    
    <button id="switch-camera-btn">🔄</button>

    <div id="result-popup">
        <p class="popup-text">画像を長押しして<br>「"写真"に追加」や「画像を保存」を<br>選んで保存してください！</p>
        <img id="result-img" src="" alt="撮影された写真">
        <button id="close-btn" onclick="closePopup()">もう一度撮る</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const shutterBtn = document.getElementById('shutter-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const popup = document.getElementById('result-popup');
        const resultImg = document.getElementById('result-img');
        
        let currentFacingMode = 'environment';

        // 📸 シャッターボタンの処理
        shutterBtn.addEventListener('click', () => {
            const video = document.querySelector('video');
            const frameImg = document.getElementById('ar-frame');

            if (!video) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // 🌟【最重要】保存する写真の比率を、カメラではなく「スマホ画面の比率(window.innerWidth/innerHeight)」にする
            const screenRatio = window.innerWidth / window.innerHeight;
            
            // ベース解像度は高めに保つため、ビデオの横幅を基準にスマホ画面比率のキャンバスを作成
            canvas.width = video.videoWidth;
            canvas.height = video.videoWidth / screenRatio;

            // ① カメラ映像を「スマホ画面で見えている範囲」だけ切り抜いてCanvasに描画 (object-fit: coverの再現)
            const videoRatio = video.videoWidth / video.videoHeight;
            let sx, sy, sw, sh;

            if (videoRatio > screenRatio) {
                // ビデオの方が横長（左右をカットしてスマホの縦長画面に合わせる）
                sh = video.videoHeight;
                sw = video.videoHeight * screenRatio;
                sx = (video.videoWidth - sw) / 2;
                sy = 0;
            } else {
                // ビデオの方が縦長（上下をカット）
                sw = video.videoWidth;
                sh = video.videoWidth / screenRatio;
                sx = 0;
                sy = (video.videoHeight - sh) / 2;
            }

            // インカメ（自撮り）の時は左右反転
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            // カメラの該当部分だけを抽出してCanvas全体に引き伸ばし描画
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

            // 反転を戻す
            if (currentFacingMode === 'user') {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            // ② フレーム画像を「スマホ画面で見えている範囲」で切り抜いてCanvasに描画
            const frameRatio = frameImg.naturalWidth / frameImg.naturalHeight;
            let fx, fy, fw, fh;

            if (frameRatio > screenRatio) {
                // フレーム画像の方が横長（左右カット）
                fh = frameImg.naturalHeight;
                fw = frameImg.naturalHeight * screenRatio;
                fx = (frameImg.naturalWidth - fw) / 2;
                fy = 0;
            } else {
                // フレーム画像の方が縦長（上下カット）
                fw = frameImg.naturalWidth;
                fh = frameImg.naturalWidth / screenRatio;
                fx = 0;
                fy = (frameImg.naturalHeight - fh) / 2;
            }

            ctx.drawImage(frameImg, fx, fy, fw, fh, 0, 0, canvas.width, canvas.height);

            // ③ ポップアップ表示
            try {
                resultImg.src = canvas.toDataURL('image/png');
                popup.style.display = 'flex';
            } catch (err) {
                alert('エラーが発生しました。スクリーンショットでの撮影をお試しください。');
            }
        });

        // 🔄 カメラ切り替え処理
        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';

            const video = document.querySelector('video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then((stream) => {
                if (video) {
                    video.srcObject = stream;
                    video.play();
                    
                    if (currentFacingMode === 'user') {
                        video.style.transform = 'scaleX(-1)';
                    } else {
                        video.style.transform = 'scaleX(1)';
                    }
                }
            }).catch((err) => {
                alert('カメラの切り替えに失敗しました。');
                console.error(err);
            });
        });

        function closePopup() {
            popup.style.display = 'none';
        }
    </script>
</body>
</html>
